services:
  ananta-web:
    build:
      context: ..
      dockerfile: arxiv-explorer/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ananta-data:/data
    environment:
      - ANANTA_API_KEY=${ANANTA_API_KEY:?Set ANANTA_API_KEY before running (see README.md)}
      - ANANTA_MODEL=${ANANTA_MODEL:?Set ANANTA_MODEL before running (see README.md)}

volumes:
  ananta-data:
