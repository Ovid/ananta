services:
  ananta-code:
    build:
      context: ..
      dockerfile: code-explorer/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ananta-code-data:/data
    environment:
      - ANANTA_API_KEY=${ANANTA_API_KEY:?Set ANANTA_API_KEY before running (see README.md)}
      - ANANTA_MODEL=${ANANTA_MODEL:?Set ANANTA_MODEL before running (see README.md)}

volumes:
  ananta-code-data:
