services:
  ananta-document-explorer:
    build:
      context: ..
      dockerfile: document-explorer/Dockerfile
    ports:
      - "8003:8003"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ananta-doc-data:/data
    environment:
      - ANANTA_API_KEY=${ANANTA_API_KEY:?Set ANANTA_API_KEY before running (see README.md)}
      - ANANTA_MODEL=${ANANTA_MODEL:?Set ANANTA_MODEL before running (see README.md)}

volumes:
  ananta-doc-data:
